<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcar Asistencia - Yikkan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brand-primary: #3A6BFF;
            --brand-dark: #0F1E39;
            --text-primary: #2F3A4A;
            --text-secondary: #6B7280;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F1F3F7;
            --success: #2AD19F;
            --error: #FF4F4F;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--brand-dark);
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 4px solid var(--bg-secondary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        video,
        canvas,
        img {
            width: 100%;
            display: block;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--brand-primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(58, 107, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--text-secondary);
        }

        .result-card {
            margin-top: 30px;
            padding: 25px;
            background: rgba(42, 209, 159, 0.1);
            border: 1px solid var(--success);
            border-radius: 16px;
            animation: slideUp 0.3s ease-out;
        }

        .result-card.error {
            background: rgba(255, 79, 79, 0.1);
            border-color: var(--error);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card h2 {
            color: var(--success);
            margin-bottom: 10px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .result-card.error h2 {
            color: var(--error);
        }

        .result-details {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .result-details p {
            margin: 8px 0;
            font-size: 1rem;
        }

        .result-details strong {
            color: var(--brand-dark);
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" style="height: 50px; width: auto;">
                    <!-- Icono de reloj -->
                    <g>
                        <rect x="0" y="0" width="120" height="120" rx="26" fill="#3A6BFF" />
                        <circle cx="60" cy="60" r="44" fill="none" stroke="#FFFFFF" stroke-width="8" />
                        <!-- Marcas -->
                        <line x1="60" y1="20" x2="60" y2="28" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="100" y1="60" x2="92" y2="60" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="60" y1="92" x2="60" y2="100" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="28" y1="60" x2="20" y2="60" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <!-- Manecillas formando una "Y" -->
                        <line x1="60" y1="60" x2="60" y2="88" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <line x1="60" y1="60" x2="38" y2="38" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <line x1="60" y1="60" x2="82" y2="38" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="60" cy="60" r="4.5" fill="#FFFFFF" />
                    </g>
                    <!-- Texto "Yikkan" más grande -->
                    <text x="150" y="86" font-family="Inter, sans-serif" font-size="95" font-weight="700"
                        fill="#0F1E39">
                        Yikkan
                    </text>
                </svg>
            </div>
            <h1>
                <i class="bi bi-check-circle" style="color: var(--success);"></i>
                <span>Marcar Asistencia</span>
            </h1>
            <p class="subtitle">Captura tu foto para registrar tu entrada o salida</p>

            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="preview" class="hidden">
            </div>

            <button id="captureBtn" class="btn btn-primary">
                <i class="bi bi-camera-fill"></i> Capturar Foto
            </button>

            <div id="resultContainer" class="hidden"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const preview = document.getElementById('preview');
        const captureBtn = document.getElementById('captureBtn');
        const resultContainer = document.getElementById('resultContainer');

        let stream = null;
        let capturedBlob = null;

        // Iniciar cámara automáticamente
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
                video.srcObject = stream;
                video.play();
            } catch (error) {
                console.error('Error accessing camera:', error);
                showError('No se pudo acceder a la cámara. Por favor, verifica los permisos.');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        async function capturePhoto() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            return new Promise((resolve) => {
                canvas.toBlob(resolve, 'image/jpeg', 0.95);
            });
        }

        captureBtn.addEventListener('click', async () => {
            if (captureBtn.textContent.includes('Capturar')) {
                // Capturar foto
                capturedBlob = await capturePhoto();
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

                preview.src = dataUrl;
                preview.classList.remove('hidden');
                video.classList.add('hidden');

                captureBtn.innerHTML = '<i class="bi bi-check-circle"></i> Verificar Asistencia';
                stopCamera();
            } else {
                // Verificar asistencia
                await verifyAttendance();
            }
        });

        async function verifyAttendance() {
            if (!capturedBlob) {
                showError('No hay foto capturada');
                return;
            }

            const formData = new FormData();
            formData.append('photo', capturedBlob, 'photo.jpg');

            captureBtn.disabled = true;
            captureBtn.innerHTML = '<span class="loading"></span> Verificando...';

            try {
                const response = await fetch('/api/check/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data);
                } else {
                    showError(data.error || 'No se pudo verificar la asistencia');
                }
            } catch (error) {
                showError('Error de conexión: ' + error.message);
            }
        }

        function showSuccess(data) {
            const employee = data.employee;
            const log = data.log;
            const typeText = log.type === 'CHECK_IN' ? 'Entrada' : 'Salida';
            const typeIcon = log.type === 'CHECK_IN'
                ? '<i class="bi bi-box-arrow-in-right" style="color: var(--success); font-size: 1.5rem;"></i>'
                : '<i class="bi bi-box-arrow-right" style="color: var(--error); font-size: 1.5rem;"></i>';

            resultContainer.className = 'result-card';
            resultContainer.innerHTML = `
                <h2><i class="bi bi-check-circle-fill"></i> Asistencia Registrada</h2>
                <div class="result-details">
                    <p><strong>${employee.first_name} ${employee.last_name}</strong></p>
                    <p>${typeIcon} <strong>${typeText}</strong></p>
                    <p style="font-size: 0.95rem; margin-top: 15px;">
                        ${new Date(log.timestamp).toLocaleString('es-MX', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            })}
                    </p>
                </div>
            `;
            resultContainer.classList.remove('hidden');

            // Resetear después de 4 segundos
            setTimeout(() => {
                resetForm();
            }, 4000);
        }

        function showError(message) {
            resultContainer.className = 'result-card error';
            resultContainer.innerHTML = `
                <h2><i class="bi bi-x-circle-fill"></i> Error</h2>
                <div class="result-details">
                    <p>${message}</p>
                </div>
            `;
            resultContainer.classList.remove('hidden');

            // Resetear después de 3 segundos
            setTimeout(() => {
                resetForm();
            }, 3000);
        }

        function resetForm() {
            capturedBlob = null;
            preview.classList.add('hidden');
            video.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            captureBtn.disabled = false;
            captureBtn.innerHTML = '<i class="bi bi-camera-fill"></i> Capturar Foto';
            startCamera();
        }

        // Iniciar cámara al cargar
        startCamera();
    </script>
</body>

</html>
