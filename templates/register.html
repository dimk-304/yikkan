{% extends 'base.html' %}

{% block title %}Registrar Empleado - Yikkan{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2
        style="margin-bottom: 10px; font-size: 1.8rem; display: flex; align-items: center; gap: 10px; color: var(--brand-dark);">
        <i class="bi bi-person-plus-fill" style="color: var(--brand-primary);"></i> Registrar Nuevo Empleado
    </h2>
    <p style="color: var(--text-secondary); margin-bottom: 30px;">
        Completa el formulario y captura una foto del empleado para registrar su rostro.
    </p>

    <div id="alertContainer"></div>

    <form id="registerForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="first_name">Nombre</label>
                <input type="text" id="first_name" name="first_name" required placeholder="Ej: Juan">
            </div>

            <div class="form-group">
                <label for="last_name">Apellido</label>
                <input type="text" id="last_name" name="last_name" required placeholder="Ej: Pérez">
            </div>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required placeholder="Ej: juan.perez@yikkan.com">
        </div>

        <div class="form-group">
            <label for="employee_id">ID de Empleado</label>
            <input type="text" id="employee_id" name="employee_id" required placeholder="Ej: EMP001">
        </div>

        <div class="form-group" style="margin-top: 30px;">
            <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                <i class="bi bi-camera" style="color: var(--brand-primary);"></i> Foto del Empleado
            </label>
            <div class="camera-container"
                style="border: 2px dashed var(--border-color); border-radius: 16px; padding: 10px; background: var(--bg-secondary); position: relative; overflow: hidden;">
                <video id="video" autoplay playsinline style="width: 100%; border-radius: 12px; display: none;"></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="preview" class="hidden" style="width: 100%; border-radius: 12px;">

                <div id="cameraPlaceholder" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                    <i class="bi bi-person-bounding-box"
                        style="font-size: 3rem; margin-bottom: 10px; display: block;"></i>
                    <p>La cámara está apagada</p>
                </div>
            </div>

            <div class="camera-controls" style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button type="button" id="startCamera" class="btn btn-secondary">
                    <i class="bi bi-camera-video"></i> Iniciar Cámara
                </button>
                <button type="button" id="capturePhoto" class="btn btn-primary hidden">
                    <i class="bi bi-camera"></i> Capturar Foto
                </button>
                <button type="button" id="retakePhoto" class="btn btn-secondary hidden">
                    <i class="bi bi-arrow-counterclockwise"></i> Tomar Otra
                </button>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary"
            style="width: 100%; margin-top: 30px; padding: 16px;" disabled>
            <i class="bi bi-check-lg"></i> Registrar Empleado
        </button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const startCameraBtn = document.getElementById('startCamera');
    const capturePhotoBtn = document.getElementById('capturePhoto');
    const retakePhotoBtn = document.getElementById('retakePhoto');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('registerForm');
    const alertContainer = document.getElementById('alertContainer');

    let stream = null;
    let capturedBlob = null;

    startCameraBtn.addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user' }
            });
            video.srcObject = stream;
            video.style.display = 'block';
            cameraPlaceholder.style.display = 'none';
            preview.classList.add('hidden');

            startCameraBtn.classList.add('hidden');
            capturePhotoBtn.classList.remove('hidden');
            retakePhotoBtn.classList.add('hidden');
        } catch (error) {
            console.error('Error accessing camera:', error);
            showAlert('No se pudo acceder a la cámara', 'error');
        }
    });

    capturePhotoBtn.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        canvas.toBlob((blob) => {
            capturedBlob = blob;
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

            preview.src = dataUrl;
            preview.classList.remove('hidden');
            video.style.display = 'none';

            capturePhotoBtn.classList.add('hidden');
            retakePhotoBtn.classList.remove('hidden');
            submitBtn.disabled = false;

            // Stop stream tracks
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }, 'image/jpeg', 0.95);
    });

    retakePhotoBtn.addEventListener('click', async () => {
        capturedBlob = null;
        preview.classList.add('hidden');
        video.style.display = 'block';

        retakePhotoBtn.classList.add('hidden');
        capturePhotoBtn.classList.remove('hidden');
        submitBtn.disabled = true;

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user' }
            });
            video.srcObject = stream;
        } catch (error) {
            console.error('Error restarting camera:', error);
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!capturedBlob) {
            showAlert('Por favor, captura una foto antes de enviar', 'error');
            return;
        }

        const formData = new FormData();
        formData.append('first_name', document.getElementById('first_name').value);
        formData.append('last_name', document.getElementById('last_name').value);
        formData.append('email', document.getElementById('email').value);
        formData.append('employee_id', document.getElementById('employee_id').value);
        formData.append('photo', capturedBlob, 'photo.jpg');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Registrando...';

        try {
            const response = await fetch('/api/register/', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                showAlert('✅ Empleado registrado exitosamente', 'success');
                form.reset();
                preview.classList.add('hidden');
                cameraPlaceholder.style.display = 'block';
                video.style.display = 'none';

                retakePhotoBtn.classList.add('hidden');
                startCameraBtn.classList.remove('hidden');
                capturedBlob = null;

                setTimeout(() => {
                    window.location.href = '/employees';
                }, 2000);
            } else {
                showAlert('❌ Error: ' + (data.error || 'No se pudo registrar el empleado'), 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Registrar Empleado';
            }
        } catch (error) {
            showAlert('❌ Error de conexión: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Registrar Empleado';
        }
    });

    function showAlert(message, type) {
        const icon = type === 'success' ? 'check-circle' : 'exclamation-triangle';
        alertContainer.innerHTML = `
            <div class="alert alert-${type}" style="display: flex; align-items: center; gap: 10px;">
                <i class="bi bi-${icon}"></i> ${message}
            </div>
        `;
        setTimeout(() => {
            alertContainer.innerHTML = '';
        }, 5000);
    }
</script>
{% endblock %}
