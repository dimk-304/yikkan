<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Yikkan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brand-primary: #3A6BFF;
            --brand-dark: #0F1E39;
            --text-primary: #2F3A4A;
            --text-secondary: #6B7280;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F1F3F7;
            --success: #2AD19F;
            --error: #FF4F4F;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: var(--brand-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--brand-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: var(--bg-primary);
            box-shadow: 0 0 0 4px rgba(58, 107, 255, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--brand-primary);
            color: white;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(58, 107, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--text-secondary);
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(42, 209, 159, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(255, 79, 79, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .footer-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .footer-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            color: var(--brand-primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" style="height: 50px; width: auto;">
                    <!-- Icono de reloj -->
                    <g>
                        <rect x="0" y="0" width="120" height="120" rx="26" fill="#3A6BFF" />
                        <circle cx="60" cy="60" r="44" fill="none" stroke="#FFFFFF" stroke-width="8" />
                        <!-- Marcas -->
                        <line x1="60" y1="20" x2="60" y2="28" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="100" y1="60" x2="92" y2="60" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="60" y1="92" x2="60" y2="100" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <line x1="28" y1="60" x2="20" y2="60" stroke="#FFFFFF" stroke-width="6"
                            stroke-linecap="round" />
                        <!-- Manecillas formando una "Y" -->
                        <line x1="60" y1="60" x2="60" y2="88" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <line x1="60" y1="60" x2="38" y2="38" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <line x1="60" y1="60" x2="82" y2="38" stroke="#FFFFFF" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="60" cy="60" r="4.5" fill="#FFFFFF" />
                    </g>
                    <!-- Texto "Yikkan" más grande -->
                    <text x="150" y="86" font-family="Inter, sans-serif" font-size="95" font-weight="700"
                        fill="#0F1E39">
                        Yikkan
                    </text>
                </svg>
            </div>
            <h2><i class="bi bi-shield-lock"></i> Iniciar Sesión</h2>
            <p class="subtitle">Ingresa tus credenciales para acceder</p>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="bi bi-person"></i> Usuario</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password"><i class="bi bi-key"></i> Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </button>
            </form>

            <div class="footer-link">
                <a href="/attendance"><i class="bi bi-arrow-left"></i> Ir a Chequeo de Asistencia</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alertContainer = document.getElementById('alertContainer');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Iniciando sesión...';

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('<i class="bi bi-check-circle"></i> Bienvenido ' + data.employee.name, 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    showAlert('<i class="bi bi-x-circle"></i> ' + (data.error || 'Error al iniciar sesión'), 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
                }
            } catch (error) {
                showAlert('<i class="bi bi-exclamation-triangle"></i> Error de conexión', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
            }
        });

        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                if (type === 'error') {
                    alertContainer.innerHTML = '';
                }
            }, 5000);
        }
    </script>
</body>

</html>
