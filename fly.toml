# Nombre de la app en Fly (debe coincidir con `fly apps list` / dashboard).
# Si aún no existe: `fly apps create yikkan`
app = "yikkan"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
